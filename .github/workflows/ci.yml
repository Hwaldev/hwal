name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust-format:
    name: rust format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
        continue-on-error: true

  rust-check:
    name: rust check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check workspace
        run: cargo check --workspace
        continue-on-error: true

  rust-clippy:
    name: rust clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace -- -W warnings
        continue-on-error: true

  ts-format:
    name: ts format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: install
        run: yarn install --frozen-lockfile --ignore-scripts
        continue-on-error: true
      - name: prettier check
        run: yarn lint
        continue-on-error: true

  ts-typecheck:
    name: ts typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: install
        run: yarn install --frozen-lockfile --ignore-scripts
        continue-on-error: true
      - name: typecheck
        run: npx tsc --noEmit
        continue-on-error: true

  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  docs:
    name: docs presence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: verify required files
        run: |
          set -e
          test -f README.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f SECURITY.md
          test -f CHANGELOG.md
          test -f ROADMAP.md
          test -f DEPLOY.md
